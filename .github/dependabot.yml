# Dependabot configuration.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Minor + patch updates are grouped per ecosystem into a single PR and are
# merged automatically by .github/workflows/dependabot-auto-merge.yml once the
# PR's checks pass. Major updates get their own PR for manual review.
version: 2
updates:
  # PHP / Composer dependencies (composer.json at the repo root).
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      composer-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Docker base image (docker/php/Dockerfile).
  - package-ecosystem: "docker"
    directory: "/docker/php"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      docker-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by workflows in .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
